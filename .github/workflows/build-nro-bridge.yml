name: Build NRO Bridge APK

on:
  push:
    paths:
      - 'android-bridge/**'
  workflow_dispatch:
    inputs:
      ws_url:
        description: 'WebSocket URL của Codespace (wss://...)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-bridge/**/*.gradle*') }}

      - name: Patch WS_URL nếu được cung cấp
        if: ${{ github.event.inputs.ws_url != '' }}
        run: |
          sed -i 's|wss://CHANGE_THIS.app.github.dev|${{ github.event.inputs.ws_url }}|g' \
            android-bridge/app/src/main/java/com/nro/bridge/BridgeService.java
          echo "✅ Đã patch WS_URL: ${{ github.event.inputs.ws_url }}"

      - name: Build Debug APK
        working-directory: android-bridge
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Nếu không có gradlew, dùng gradle wrapper setup
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.4
          fi
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NROBridge-APK
          path: android-bridge/app/build/outputs/apk/debug/NROBridge-debug.apk
          retention-days: 30

      - name: APK info
        run: |
          APK=android-bridge/app/build/outputs/apk/debug/NROBridge-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ APK built successfully!"
            echo "📦 Size: $SIZE"
            echo "📥 Download từ Actions tab → Artifacts → NROBridge-APK"
          fi
