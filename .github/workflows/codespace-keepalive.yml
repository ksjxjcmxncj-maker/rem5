name: NRO Keepalive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.NRO_GH_TOKEN }}
      REPLIT_API_URL: ${{ vars.REPLIT_API_URL }}
      NRO_UPDATE_SECRET: ${{ secrets.NRO_UPDATE_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Check & ensure Codespace is Available
        run: |
          CS=$(node -e "console.log(require('./state/active-codespace.json').name)")
          echo "Codespace: $CS"

          STATE=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/user/codespaces/$CS" \
            | grep -o '"state":"[^"]*"' | cut -d'"' -f4 || echo "Unknown")
          echo "State: $STATE"

          if [ "$STATE" != "Available" ]; then
            echo "Not available — starting..."
            curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/user/codespaces/$CS/start" || true
            for i in $(seq 1 20); do
              sleep 15
              STATE=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/user/codespaces/$CS" \
                | grep -o '"state":"[^"]*"' | cut -d'"' -f4 || echo "Unknown")
              echo "  ($i/20) $STATE"
              [ "$STATE" = "Available" ] && break
            done
          fi
          echo "Final state: $STATE"

      - name: Check game services & restart Codespace if down
        run: |
          CS=$(node -e "console.log(require('./state/active-codespace.json').name)")

          # Kiểm tra FRPC port 21445 (TCP tunnel game server)
          FRPC_OK=$(timeout 5 bash -c 'echo >/dev/tcp/frp.freefrp.net/21445' 2>&1 \
            && echo yes || echo no)
          echo "FRPC 21445: $FRPC_OK"

          if [ "$FRPC_OK" = "no" ]; then
            echo "Game services DOWN — stop+start Codespace to trigger postStartCommand..."

            curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/user/codespaces/$CS/stop" || true
            sleep 25

            curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/user/codespaces/$CS/start" || true

            echo "Waiting for Codespace + postStartCommand (~90s)..."
            sleep 90

            for i in $(seq 1 12); do
              sleep 15
              STATE=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/user/codespaces/$CS" \
                | grep -o '"state":"[^"]*"' | cut -d'"' -f4 || echo "Unknown")
              echo "  ($i/12) $STATE"
              [ "$STATE" = "Available" ] && break
            done

            # Verify FRPC came up
            sleep 20
            FRPC_AFTER=$(timeout 5 bash -c 'echo >/dev/tcp/frp.freefrp.net/21445' 2>&1 \
              && echo yes || echo no)
            echo "FRPC after restart: $FRPC_AFTER"
          else
            echo "Game services OK"
          fi

          echo "Keepalive done: $(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S VN')"

      - name: Push WS URL to Replit
        if: always()
        run: |
          CS=$(node -e "console.log(require('./state/active-codespace.json').name)")
          WS_URL="wss://${CS}-8080.app.github.dev"

          if [ -n "$REPLIT_API_URL" ] && [ -n "$NRO_UPDATE_SECRET" ]; then
            curl -s -X POST "${REPLIT_API_URL}/api/ws-url" \
              -H "Content-Type: application/json" \
              -H "x-update-secret: ${NRO_UPDATE_SECRET}" \
              -d "{\"url\":\"$WS_URL\"}" && echo "WS URL updated: $WS_URL"
          else
            echo "SKIP: REPLIT_API_URL or NRO_UPDATE_SECRET not set"
          fi
