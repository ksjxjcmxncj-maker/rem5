name: Codespace Keep-Alive
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Install gh CLI
        run: |
          curl -sL https://github.com/cli/cli/releases/download/v2.52.0/gh_2.52.0_linux_amd64.tar.gz \
            | tar -xz -C /tmp/
          echo "/tmp/gh_2.52.0_linux_amd64/bin" >> "$GITHUB_PATH"

      - name: Check & Fix Services
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CS=$(gh codespace list --json name,state \
            -q '.[] | select(.state=="Available" or .state=="Starting") | .name' \
            2>/dev/null | head -1)
          if [ -z "$CS" ]; then
            echo "Khong co Codespace nao dang chay"
            exit 0
          fi
          echo "Codespace: $CS"
          SCRIPT_URL="https://raw.githubusercontent.com/ksjxjcmxncj-maker/rem5/main/scripts/keepalive_check.sh"
          gh codespace ssh -c "$CS" -- "curl -fsSL '$SCRIPT_URL' | bash"
