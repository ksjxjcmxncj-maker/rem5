name: WS Keepalive — Ping & Auto-Restart

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GITHUB_TOKEN_A: ${{ secrets.GITHUB_TOKEN_A }}
      GITHUB_TOKEN_B: ${{ secrets.GITHUB_TOKEN_B }}
      GITHUB_TOKEN_C: ${{ secrets.GITHUB_TOKEN_C }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      REPLIT_API_URL: ${{ vars.REPLIT_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Load active codespace state
        id: cs
        run: |
          CS_NAME=$(node -e "const j=require('./state/active-codespace.json');console.log(j.name)")
          ACCOUNT=$(node  -e "const j=require('./state/active-codespace.json');console.log(j.account)")
          echo "name=$CS_NAME"   >> $GITHUB_OUTPUT
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT
          echo "ws_url=wss://${CS_NAME}-8080.app.github.dev"   >> $GITHUB_OUTPUT
          echo "http_url=https://${CS_NAME}-8080.app.github.dev" >> $GITHUB_OUTPUT
          echo "Active: $ACCOUNT / $CS_NAME"

      - name: Check active hours (VN time)
        id: time
        run: |
          VN_HOUR=$(TZ=Asia/Ho_Chi_Minh date '+%H' | sed 's/^0*//' || echo "12")
          VN_HOUR=${VN_HOUR:-12}
          if [ "$VN_HOUR" -ge 4 ]; then
            echo "active=true"  >> $GITHUB_OUTPUT
            echo "VN ${VN_HOUR}h — trong gio hoat dong"
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "VN ${VN_HOUR}h — ngoai gio (00:00-04:00)"
          fi

      - name: Ping WS bridge
        if: steps.time.outputs.active == 'true'
        id: ping
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 ${{ steps.cs.outputs.http_url }} 2>/dev/null || echo "000")
          echo "code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "Bridge HTTP: $HTTP_CODE"

      - name: Restart services if down
        if: >
          steps.time.outputs.active == 'true' &&
          (steps.ping.outputs.code == '000' ||
           steps.ping.outputs.code == '502' ||
           steps.ping.outputs.code == '503' ||
           steps.ping.outputs.code == '504')
        run: |
          ACCOUNT="${{ steps.cs.outputs.account }}"
          case "$ACCOUNT" in
            A) export GH_TOKEN="$GITHUB_TOKEN_A" ;;
            B) export GH_TOKEN="$GITHUB_TOKEN_B" ;;
            C) export GH_TOKEN="$GITHUB_TOKEN_C" ;;
            *) export GH_TOKEN="$GITHUB_TOKEN_A" ;;
          esac
          CS="${{ steps.cs.outputs.name }}"
          echo "Bridge down (${{ steps.ping.outputs.code }}) — restart on $CS"
          gh codespace ssh -c "$CS" -- bash << 'REMOTE'
            set -e; LOG="$HOME/logs"; mkdir -p "$LOG"

            mysql -u root -e "SELECT 1;" > /dev/null 2>&1 || {
              sudo service mariadb start 2>/dev/null || true; sleep 5; }
            echo OK_DB

            if ! pgrep -f NgocRongOnline > /dev/null 2>&1; then
              for d in ~/nro/SRC /home/codespace/nro/SRC; do
                [ -f "$d/NgocRongOnline.jar" ] && {
                  cd "$d"
                  # Đảm bảo Xvfb chạy (cần cho JFrame, dialog AWT)
                  if ! pgrep -x Xvfb > /dev/null 2>&1; then
                    nohup Xvfb :99 -screen 0 1024x768x24 >> "$LOG/xvfb.log" 2>&1 &
                    sleep 2
                  fi
                  export DISPLAY=:99
                  nohup java -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=30 \
                    -XX:G1HeapRegionSize=4m -XX:+ParallelRefProcEnabled \
                    -Djava.net.preferIPv4Stack=true \
                    -Djava.awt.headless=true \
                    -jar NgocRongOnline.jar >> "$LOG/server.log" 2>&1 &
                  sleep 15; break; }
              done
            fi
            pgrep -f NgocRongOnline && echo OK_GAME || echo FAIL_GAME

            if ! pgrep -f ws_bridge > /dev/null 2>&1; then
              for p in ~/bin/ws_bridge.py ~/ws_bridge.py /tmp/ws_bridge.py; do
                [ -f "$p" ] && { nohup python3 "$p" >> "$LOG/ws_bridge.log" 2>&1 &; sleep 3; break; }
              done
              if ! pgrep -f ws_bridge > /dev/null 2>&1; then
                cat > /tmp/ws_bridge.py << 'PYEOF'
#!/usr/bin/env python3
import asyncio, logging, sys, subprocess
logging.basicConfig(level=logging.INFO, format='[%(asctime)s] %(message)s')
log = logging.getLogger(__name__)
try:
    import websockets
except ImportError:
    subprocess.run([sys.executable,"-m","pip","install","websockets","-q"])
    import websockets
async def handle(ws, path=None):
    try:
        r, w = await asyncio.open_connection("127.0.0.1", 14445)
        async def a2b():
            async for d in ws:
                if isinstance(d, bytes): w.write(d); await w.drain()
            w.close()
        async def b2a():
            while True:
                d = await r.read(65536)
                if not d: break
                await ws.send(d)
            await ws.close()
        await asyncio.gather(a2b(), b2a(), return_exceptions=True)
    except Exception as e:
        log.error(str(e))
async def main():
    async with websockets.serve(handle,"0.0.0.0",8080,ping_interval=20,ping_timeout=10,max_size=10*1024*1024,compression=None):
        await asyncio.Future()
asyncio.run(main())
PYEOF
                nohup python3 /tmp/ws_bridge.py >> "$LOG/ws_bridge.log" 2>&1 &; sleep 3
              fi
            fi
            pgrep -f ws_bridge && echo OK_BRIDGE || echo FAIL_BRIDGE

            gh codespace ports visibility 8080:public -c "$CODESPACE_NAME" 2>/dev/null || true
REMOTE
          WS_URL="${{ steps.cs.outputs.ws_url }}"
          curl -s -X POST "${REPLIT_API_URL}/api/ws-url" \
            -H "Content-Type: application/json" \
            -H "x-update-secret: ${SESSION_SECRET}" \
            -d "{\"url\":\"$WS_URL\"}" && echo "URL pushed: $WS_URL"

      - name: Ping keepalive (always)
        if: steps.time.outputs.active == 'true'
        run: |
          ACCOUNT="${{ steps.cs.outputs.account }}"
          case "$ACCOUNT" in
            A) export GH_TOKEN="$GITHUB_TOKEN_A" ;;
            B) export GH_TOKEN="$GITHUB_TOKEN_B" ;;
            C) export GH_TOKEN="$GITHUB_TOKEN_C" ;;
            *) export GH_TOKEN="$GITHUB_TOKEN_A" ;;
          esac
          gh codespace ports visibility 8080:public -c "${{ steps.cs.outputs.name }}" 2>/dev/null || true
          echo "Keepalive: $(TZ=Asia/Ho_Chi_Minh date '+%H:%M VN')"
